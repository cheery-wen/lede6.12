name: 编译 Lean OpenWrt (最终优化版)

on:
  push:
    branches: [ master ]
  repository_dispatch:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/coolsnowwolf/lede
  REPO_BRANCH: master
  CONFIG_FILE: .config
  FEEDS_CONF: feeds.conf.default
  DIY1_SH: diy1.sh
  DIY2_SH: diy2.sh
  TZ: Asia/Shanghai
  OPENWRT_NAME: "lede"
  UPLOAD_RELEASE: true
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: 编译任务
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: 释放系统最大可用空间
        run: |
          sudo apt-get clean
          docker system prune -af
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost /usr/local/lib/android \
            /usr/local/lib/node_modules /opt/hostedtoolcache /usr/local/.ghcup /usr/local/.cargo \
            /usr/local/lib/python3.* /usr/local/aws-sam-cli /usr/local/aws-cli /usr/local/julia* \
            /usr/share/swift /usr/share/miniconda /usr/share/az* /usr/share/kotlinc /opt/microsoft \
            /opt/google /var/lib/gems /opt/pipx /opt/amazon
          df -h

      - name: 检出仓库代码
        uses: actions/checkout@v5

      - name: 设置当前的日期
        run: |
          sudo timedatectl set-timezone "$TZ"
          echo "date1=$(date +'%Y.%m.%d-%H.%M')" >> $GITHUB_ENV
          echo "date2=$(date +'%Y.%m.%d')" >> $GITHUB_ENV
          echo "date3=$(date '+%Y年%m月%d日')" >> $GITHUB_ENV

      - name: 安装编译依赖
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install build-essential asciidoc binutils bzip2 gawk gettext git \
            libncurses5-dev libz-dev patch python3 unzip zlib1g-dev lib32gcc-s1 libc6-dev-i386 \
            subversion flex uglifyjs git-core gcc-multilib p7zip p7zip-full msmtp libssl-dev \
            texinfo libglib2.0-dev xmlto qemu-utils upx libelf-dev autoconf automake libtool \
            autopoint device-tree-compiler g++-multilib antlr3 gperf wget curl swig rsync
          df -h

      - name: 克隆 Lean OpenWrt 源码
        run: git clone --depth 1 $REPO_URL -b $REPO_BRANCH openwrt

      - name: 首次自定义配置（处理 feeds.conf.default 并执行 diy1.sh）
        run: |
          cd openwrt
          [ -f "../$FEEDS_CONF" ] && cp "../$FEEDS_CONF" ./
          [ -f "../$DIY1_SH" ] && chmod +x "../$DIY1_SH" && "../$DIY1_SH"

      - name: 更新 feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 缓存 dl、staging_dir、build_dir
        uses: actions/cache@v5
        with:
          path: |
            openwrt/dl
            openwrt/staging_dir
            openwrt/build_dir
          key: openwrt-${{ github.ref }}-${{ github.run_id }}
          restore-keys: openwrt-${{ github.ref }}-

      - name: 再次加载自定义配置（复制 .config，执行 diy2.sh，make defconfig）
        run: |
          [ -e "$CONFIG_FILE" ] && cp "$CONFIG_FILE" openwrt/.config
          cd openwrt
          [ -f "../$DIY2_SH" ] && chmod +x "../$DIY2_SH" && "../$DIY2_SH"
          make defconfig

      - name: 下载源码包
        run: |
          cd openwrt
          make download -j8
          find dl -size -1024c -exec ls -l {} \;
          make download -j8 || make download -j1 V=s

      - name: 编译固件
        id: compile
        run: |
          cd openwrt
          echo -e "$(nproc) thread compile"
          make -j$(nproc) || make -j1 || make -j1 V=s
          echo "status=success" >> $GITHUB_OUTPUT

      - name: 检查磁盘使用情况
        if: (!cancelled())
        run: df -hT

      - name: 上传 bin 目录
        if: steps.compile.outcome == 'success' && env.UPLOAD_BIN_DIR == 'true'
        uses: actions/upload-artifact@v6
        with:
          name: bin_${{ env.OPENWRT_NAME }}_${{ env.date1 }}
          path: openwrt/bin

      - name: 整理固件文件（从目录路径提取设备名，如 x86/64 -> x86_64）
        id: organize
        if: steps.compile.outcome == 'success'
        run: |
          mkdir -p firmware
          # 查找固件所在目录（通常为 bin/targets/xxx/yyy）
          target_dir=$(find openwrt/bin/targets -type d -name "squashfs-combined*" | head -1 | xargs dirname 2>/dev/null || true)
          if [ -z "$target_dir" ]; then
            # 备用：查找任意 squashfs-combined 文件所在目录
            target_dir=$(find openwrt/bin/targets -name "*squashfs-combined*" -type f | head -1 | xargs dirname 2>/dev/null || true)
          fi
          if [ -n "$target_dir" ]; then
            # 从路径中提取设备名，例如 .../x86/64 -> x86_64
            device=$(basename "$target_dir")_$(basename "$(dirname "$target_dir")") | sed 's/_/ /' | awk '{print $2"_"$1}')  # 简单处理：取最后两级目录并反转顺序
            # 更可靠的方法：直接用 sed 替换
            device=$(echo "$target_dir" | sed -r 's/.*\/([^\/]+)\/([^\/]+)$/\2_\1/')
          else
            device="unknown"
          fi
          # 如果提取结果为空或格式不对，回退到从文件名提取
          if [ -z "$device" ] || [ "$device" = "unknown" ]; then
            # 取第一个固件文件的基础名
            first_file=$(find openwrt/bin/targets -name "*squashfs-combined*" -type f | head -1)
            if [ -n "$first_file" ]; then
              base=$(basename "$first_file")
              device=$(echo "$base" | sed -r 's/-squashfs-combined.*//')
            fi
          fi
          [ -z "$device" ] && device="unknown"
          echo "DEVICE_NAME=$device" >> $GITHUB_ENV
          
          # 复制配置文件
          cp -v ./openwrt/.config firmware/${{ env.date1 }}_${{ env.OPENWRT_NAME }}_${device}.config
          
          # 查找并复制所有 squashfs-combined 固件
          find openwrt/bin/targets -maxdepth 4 -type f -name "*squashfs-combined*" | while read file; do
            base=$(basename "$file")
            if echo "$base" | grep -q "efi"; then
              boot_type="efi"
            else
              boot_type="combined"
            fi
            if [[ "$base" == *.img.gz ]]; then
              ext="img.gz"
            else
              ext="${base##*.}"
            fi
            new_name="${{ env.date1 }}_${{ env.OPENWRT_NAME }}_${device}_${boot_type}.${ext}"
            cp "$file" "firmware/$new_name"
          done
          
          cd firmware
          echo "FIRMWARE=$PWD" >> $GITHUB_ENV
          echo "status=success" >> $GITHUB_OUTPUT
          ls -lh

      - name: 上传固件到 Artifact
        if: steps.organize.outcome == 'success' && env.UPLOAD_FIRMWARE == 'true'
        uses: actions/upload-artifact@v6
        with:
          name: firmware_${{ env.OPENWRT_NAME }}_${{ env.DEVICE_NAME }}_${{ env.date1 }}
          path: ${{ env.FIRMWARE }}

      - name: 生成发布标签和感谢语
        id: release
        if: steps.organize.outcome == 'success' && env.UPLOAD_RELEASE == 'true'
        run: |
          cat > release.txt <<EOF
          由衷感谢所有为 OpenWrt 无私奉献的大佬们
          📥 固件下载
          EOF
          echo "status=success" >> $GITHUB_OUTPUT

      - name: 创建正式 Release 并上传固件
        if: steps.release.outcome == 'success'
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ env.date2 }}
          name: ${{ env.date3 }}
          body_path: release.txt
          files: ${{ env.FIRMWARE }}/*
          draft: false
          prerelease: false

      - name: 编译后深度清理
        if: always()
        run: |
          rm -rf openwrt/build_dir openwrt/bin openwrt/staging_dir openwrt/tmp
          df -h
