name: 编译 OpenWrt (最终优化版)

on:
  push:
    branches: [ master ]
  repository_dispatch:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/coolsnowwolf/lede
  REPO_BRANCH: master
  CONFIG_FILE: .config
  FEEDS_CONF: feeds.conf.default
  DIY1_SH: diy1.sh                 # 首次配置脚本（修改 feeds 源）
  DIY2_SH: diy2.sh                 # 二次配置脚本（修改 .config）
  TZ: Asia/Shanghai
  OPENWRT_NAME: "lede"
  UPLOAD_RELEASE: true
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # 强制使用 Node.js 24

jobs:
  build:
    name: 编译任务
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      # 1. 释放磁盘空间（删除无用工具）
      - name: 释放系统最大可用空间
        run: |
          sudo apt-get clean
          docker system prune -af
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost /usr/local/lib/android \
            /usr/local/lib/node_modules /opt/hostedtoolcache /usr/local/.ghcup /usr/local/.cargo \
            /usr/local/lib/python3.* /usr/local/aws-sam-cli /usr/local/aws-cli /usr/local/julia* \
            /usr/share/swift /usr/share/miniconda /usr/share/az* /usr/share/kotlinc /opt/microsoft \
            /opt/google /var/lib/gems /opt/pipx /opt/amazon
          df -h

      # 2. 检出本仓库（存放 .config、diy1.sh、diy2.sh 等）
      - name: 检出仓库代码
        uses: actions/checkout@v5

      # 3. 设置时区与日期变量
      - name: 设置当前的日期
        run: |
          sudo timedatectl set-timezone "$TZ"
          echo "date1=$(date +'%Y.%m.%d-%H.%M')" >> $GITHUB_ENV
          echo "date2=$(date +'%Y.%m.%d')" >> $GITHUB_ENV
          echo "date3=$(date '+%Y年%m月%d日')" >> $GITHUB_ENV

      # 4. 安装编译依赖（Ubuntu 24.04 无 python2.7）
      - name: 安装编译依赖
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install build-essential asciidoc binutils bzip2 gawk gettext git \
            libncurses5-dev libz-dev patch python3 unzip zlib1g-dev lib32gcc-s1 libc6-dev-i386 \
            subversion flex uglifyjs git-core gcc-multilib p7zip p7zip-full msmtp libssl-dev \
            texinfo libglib2.0-dev xmlto qemu-utils upx libelf-dev autoconf automake libtool \
            autopoint device-tree-compiler g++-multilib antlr3 gperf wget curl swig rsync
          df -h

      # 5. 克隆 LEDE 源码
      - name: 克隆 OpenWrt 源码
        run: git clone --depth 1 $REPO_URL -b $REPO_BRANCH openwrt

      # 6. 首次自定义配置：替换 feeds.conf.default 并执行 diy1.sh
      - name: 首次自定义配置（处理 feeds.conf.default 并执行 diy1.sh）
        run: |
          cd openwrt
          [ -f "../$FEEDS_CONF" ] && cp "../$FEEDS_CONF" ./
          [ -f "../$DIY1_SH" ] && chmod +x "../$DIY1_SH" && "../$DIY1_SH"

      # 7. 更新 feeds
      - name: 更新 feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      # 8. 缓存 dl、staging_dir、build_dir
      - name: 缓存 dl、staging_dir、build_dir
        uses: actions/cache@v5
        with:
          path: |
            openwrt/dl
            openwrt/staging_dir
            openwrt/build_dir
          key: openwrt-${{ github.ref }}-${{ github.run_id }}
          restore-keys: openwrt-${{ github.ref }}-

      # 9. 再次加载自定义配置：复制 .config、执行 diy2.sh、生成默认配置
      - name: 再次加载自定义配置（复制 .config，执行 diy2.sh，make defconfig）
        run: |
          [ -e "$CONFIG_FILE" ] && cp "$CONFIG_FILE" openwrt/.config
          cd openwrt
          [ -f "../$DIY2_SH" ] && chmod +x "../$DIY2_SH" && "../$DIY2_SH"
          make defconfig

      # 10. 下载源码包（并行下载，失败后重试）
      - name: 下载源码包
        run: |
          cd openwrt
          make download -j8
          find dl -size -1024c -exec ls -l {} \;
          make download -j8 || make download -j1 V=s

      # 11. 编译固件（自动降级重试，提取设备名）
      - name: 编译固件
        id: compile
        run: |
          cd openwrt
          echo -e "$(nproc) thread compile"
          make -j$(nproc) || make -j1 || make -j1 V=s
          echo "status=success" >> $GITHUB_OUTPUT
          grep '^CONFIG_TARGET_.*_DEVICE_.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
          [ -s DEVICE_NAME ] && echo "DEVICE_NAME=$(cat DEVICE_NAME)" >> $GITHUB_ENV

      # 12. 检查磁盘使用情况（可选）
      - name: 检查磁盘使用情况
        if: (!cancelled())
        run: df -hT

      # 13. 上传 bin 目录（按需）
      - name: 上传 bin 目录
        if: steps.compile.outcome == 'success' && env.UPLOAD_BIN_DIR == 'true'
        uses: actions/upload-artifact@v6
        with:
          name: bin_${{ env.OPENWRT_NAME }}_${{ env.DEVICE_NAME }}_${{ env.date1 }}
          path: openwrt/bin

      # 14. 整理固件到 firmware 目录（仅保留传统+EFI squashfs 固件，简化文件名）
      - name: 整理固件文件
        id: organize
        if: steps.compile.outcome == 'success'
        run: |
          mkdir -p firmware
          # 复制配置文件（作为记录）
          cp -v ./openwrt/.config firmware/${{ env.date1 }}_${{ env.OPENWRT_NAME }}_${{ env.DEVICE_NAME }}.config
          
          # 查找所有 squashfs-combined 固件（包括传统和 EFI）
          find openwrt/bin/targets/*/*/ -maxdepth 1 -type f -name "*squashfs-combined*" | while read file; do
            # 判断启动类型
            if echo "$file" | grep -q "efi"; then
              boot_type="efi"
            else
              boot_type="combined"
            fi
            # 保留原始扩展名（如 .img, .img.gz）
            ext="${file##*.}"
            # 新文件名：日期_项目名_设备名_启动类型.扩展名
            new_name="${{ env.date1 }}_${{ env.OPENWRT_NAME }}_${{ env.DEVICE_NAME }}_${boot_type}.${ext}"
            cp "$file" "firmware/$new_name"
          done
          
          cd firmware
          echo "FIRMWARE=$PWD" >> $GITHUB_ENV
          echo "status=success" >> $GITHUB_OUTPUT
          ls -lh

      # 15. 上传固件到 Artifact
      - name: 上传固件到 Artifact
        if: steps.organize.outcome == 'success' && env.UPLOAD_FIRMWARE == 'true'
        uses: actions/upload-artifact@v6
        with:
          name: firmware_${{ env.OPENWRT_NAME }}_${{ env.DEVICE_NAME }}_${{ env.date1 }}
          path: ${{ env.FIRMWARE }}

      # 16. 生成 Release 正文（感谢语）
      - name: 生成发布标签和感谢语
        id: release
        if: steps.organize.outcome == 'success' && env.UPLOAD_RELEASE == 'true'
        run: |
          cat > release.txt <<EOF
          由衷感谢所有为 OpenWrt 无私奉献的大佬们
          📥 固件下载
          EOF
          echo "status=success" >> $GITHUB_OUTPUT

      # 17. 创建正式 Release 并上传固件
      - name: 创建正式 Release 并上传固件
        if: steps.release.outcome == 'success'
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ env.date2 }}
          name: ${{ env.date3 }}
          body_path: release.txt
          files: ${{ env.FIRMWARE }}/*
          draft: false
          prerelease: false

      # 18. 编译后深度清理（释放空间）
      - name: 编译后深度清理
        if: always()
        run: |
          rm -rf openwrt/build_dir openwrt/bin openwrt/staging_dir openwrt/tmp
          df -h
